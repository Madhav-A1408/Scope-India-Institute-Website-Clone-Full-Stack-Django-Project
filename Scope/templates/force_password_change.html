{% load static %}
<!DOCTYPE html>
<!-- Coding By CodingNepal - codingnepalweb.com -->
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
     <title> Check Password and Confirm Password </title> 
    <link rel="stylesheet" href="{% static 'css/passchange.css' %}">
    <!-- Fontawesome CDN Link -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css"/>
   </head>
<body>
    <div class="wrapper">
        <h2>Change Your Password</h2>
        <form method="POST" action="{% url 'force_password_change' %}" onsubmit="return validatePasswords();">
        {% csrf_token %}
        <div class="input-box">
            <input id="create_pw" type="password" name="new_password" required>
            <label for="new_password">Enter New Password</label>
            <i class="fas fa-eye-slash show"></i>
        </div>
        <div class="input-box">
            <input id="confirm_pw" type="password" name="confirm_password" disabled required>
            <label for="confirm_password">Confirm Password</label>
            <i class="fas fa-eye-slash show"></i>
        </div>
        <div class="alert">
            <i class="fas fa-exclamation-circle error"></i>
            <span class="text">Enter at least 8 characters</span>
        </div>
        <div class="input-box button">
            <input id="submit_button" type="submit" value="Change Password"  >
        </div>
    </div>
  
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const createPw = document.querySelector("#create_pw");
        const confirmPw = document.querySelector("#confirm_pw");
        const pwShow = document.querySelector(".show");
        const alertIcon = document.querySelector(".error");
        const alertText = document.querySelector(".text");
        const submitBtn = document.querySelector("#submit_button");
    
        // Toggle password visibility
        pwShow.addEventListener("click", () => {
          const type = createPw.type === "password" ? "text" : "password";
          createPw.type = type;
          confirmPw.type = type;
          pwShow.classList.toggle("fa-eye");
          pwShow.classList.toggle("fa-eye-slash");
        });
    
        // Enable confirm + submit if password is long enough
        createPw.addEventListener("input", () => {
          const val = createPw.value.trim();
          if (val.length >= 8) {
            confirmPw.removeAttribute("disabled");
            submitBtn.removeAttribute("disabled");
            alertText.innerText = "";
            alertIcon.style.display = "none";
          } else {
            confirmPw.setAttribute("disabled", true);
            submitBtn.setAttribute("disabled", true);
            confirmPw.value = "";
            alertText.innerText = "Enter at least 8 characters";
            alertText.style.color = "#a6a6a6";
            alertIcon.style.display = "none";
          }
        });
    
        // Final check before submitting
        window.validatePasswords = function () {
          if (createPw.value !== confirmPw.value) {
            alertText.innerText = "Password didn't match";
            alertText.style.color = "#D93025";
            alertIcon.style.display = "block";
            return false; // prevent submit
          }
          return true; // allow submit
        };
      });
    </script>
    
    
</body>
</html>
