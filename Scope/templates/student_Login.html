{% load static %}
<!DOCTYPE html>
<!-- Coding by CodingNepal | www.codingnepalweb.com-->
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title> Login and Registration Form in HTML & CSS | CodingLab </title>
    <link rel="stylesheet" href="{% static 'css/style_stuLogin.css' %} ">
    <!-- Fontawesome CDN Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   </head>
<body>
  <div class="container">
    <input type="checkbox" id="flip">
    {% for image in images %}
    <div class="cover">
      <div class="front">
        <img src="{{ image.login_page.url }}" alt="">
        
      </div>
      <div class="back">
        <img class="backImg" src="{{ image.sign_up_page.url }} " alt="">
        
      </div>
    </div>
    {% endfor %}
    <div class="forms">
        <div class="form-content">
          <div class="login-form">
            <div class="title">Login</div>
          <form method = "POST" action="{% url 'stu_Login' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="input-boxes">
              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email"placeholder="Enter your email" required>
              </div>
              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Enter your password" required>
              </div>
              <div class="text"><a href="{% url 'stu_Login' %}?flip=true">Forgot password?</a></div>

              <div class="button input-box">
                <input type="submit" value="Sumbit">
              </div>
              <div class="text sign-up-text">New Student? <label for="flip">Sigup now</label></div>
            </div>
         </form>
      </div>
         <div class="signup-form">
          <div class="title">Signup</div>
          <form method = "POST" action="{% url 'generate_passcode' %}">
            {% csrf_token %}
            <div class="input-boxes">
              <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="email" name = "email" placeholder="Enter Email Id" required>
              </div>
              <!-- <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="text" placeholder="Enter your email" required>
              </div>
              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Enter your password" required>
              </div> -->
              <div class="button input-box">
                <input type="submit" value="Generate Passcode">
                <!-- <a href="{% url 'generate_passcode' %}">
                    <input type="submit" name="submit" value=" Generate Passcode">
                    <span class="btnText">New Student? Generate Passcode</span>
                </a> -->
              </div>
              <div class="text sign-up-text">Registered Student?  <label for="flip">Login now</label></div>
             </div>
          </form>
        </div>
        
    </div>
    <div class="text home-link">
      <a href="{% url 'home' %}">← Back to Home</a>
    
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('flip') === 'true') {
        document.getElementById('flip').checked = true;
      }
    });
  </script>
</body>
</html>
